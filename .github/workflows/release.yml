name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate icons from icon.png
        run: npm run icon

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '纸间便利贴 v__VERSION__'
          releaseBody: |
            纸间便利贴 v__VERSION__ 发布

            ### 下载说明
            - **Setup 安装包**：双击运行安装程序
            - **Portable 便携版**：双击直接运行，无需安装

            ### 新功能
            - 多窗口便利贴（无边框透明）
            - 6 色莫兰迪配色
            - 文本模式（Markdown 支持）
            - 条目模式（拖拽排序、勾选完成）
            - 系统托盘
          releaseDraft: false
          prerelease: false
