name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Generate icons from icon.png
        run: npm run icon

      - name: Build Tauri app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run tauri build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-artifacts
          path: src-tauri/target/release/bundle/**
          retention-days: 5

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          release_name: '纸间便利贴 ${{ github.ref_name }}'
          body: |
            纸间便利贴 ${{ github.ref_name }} 发布

            ### 下载说明
            - **Setup 安装包**：双击运行安装程序
            - **Portable 便携版**：双击直接运行，无需安装

            ### v0.3.0 更新内容
            - 修复窗口无法拖动问题（JS 拖拽替代 data-tauri-drag-region）
            - 修复无法创建新便利贴问题（智能位置计算 + 焦点确保）
            - 消除 Release 构建黑色控制台窗口
            - 修复 NSIS 安装路径中文问题
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/app/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
