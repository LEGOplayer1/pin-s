<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>纸间</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Playfair+Display:wght@400;500;600&family=LXGW+WenKai:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --fg: #4A433A;
  --fg-light: #8A8279;
  --fg-muted: #B0A899;

  /* 莫兰迪 6 色 */
  --note-cream:    #FAF6EE;
  --note-blue:     #E8EDF2;
  --note-pink:     #F2E8E8;
  --note-green:    #E8F0E8;
  --note-lavender: #ECE8F0;
  --note-yellow:   #F5F0DC;

  --note-cream-darker:    #E8DECB;
  --note-blue-darker:     #D3DCE5;
  --note-pink-darker:     #E0CDCD;
  --note-green-darker:    #CFDBCF;
  --note-lavender-darker: #D9CFE0;
  --note-yellow-darker:   #E8DCB0;

  --radius: 6px;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: transparent;
  font-family: 'LXGW WenKai', '霞鹜文楷', serif;
  color: var(--fg);
  user-select: none;
  -webkit-user-select: none;
}

/* ============================================================
   便利贴主容器（整个窗口 = 一张便利贴）
   ============================================================ */
.note {
  position: absolute;
  inset: 8px; /* 向外留一点阴影空间 */
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  transition: background-color 0.3s, box-shadow 0.3s;
  box-shadow: 0 4px 18px rgba(74, 67, 58, 0.18), 0 2px 6px rgba(74, 67, 58, 0.08);
  overflow: hidden;
}

/* 颜色变体 */
.note[data-color="cream"]    { background: var(--note-cream); }
.note[data-color="blue"]     { background: var(--note-blue); }
.note[data-color="pink"]     { background: var(--note-pink); }
.note[data-color="green"]    { background: var(--note-green); }
.note[data-color="lavender"] { background: var(--note-lavender); }
.note[data-color="yellow"]   { background: var(--note-yellow); }

.note[data-color="cream"]    .note-header { background: var(--note-cream-darker); }
.note[data-color="blue"]     .note-header { background: var(--note-blue-darker); }
.note[data-color="pink"]     .note-header { background: var(--note-pink-darker); }
.note[data-color="green"]    .note-header { background: var(--note-green-darker); }
.note[data-color="lavender"] .note-header { background: var(--note-lavender-darker); }
.note[data-color="yellow"]   .note-header { background: var(--note-yellow-darker); }

/* 纸张微纹理（半透明噪点叠加） */
.note::after {
  content: '';
  position: absolute; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.0' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  border-radius: var(--radius);
}

/* ============================================================
   标题栏（可拖拽区）
   ============================================================ */
.note-header {
  height: 28px;
  padding: 0 6px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  z-index: 1;
  -webkit-app-region: drag; /* Electron 拖拽区 */
  cursor: grab;
  transition: background 0.3s;
}

.note-header:active { cursor: grabbing; }

.color-dots {
  display: flex; gap: 4px;
  -webkit-app-region: no-drag;
}

.color-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  cursor: pointer;
  border: 1.5px solid rgba(74, 67, 58, 0.15);
  transition: transform 0.15s, border-color 0.15s;
}

.color-dot:hover { transform: scale(1.25); }
.color-dot.active { border-color: rgba(74, 67, 58, 0.55); }

.window-actions {
  display: flex; gap: 2px;
  -webkit-app-region: no-drag;
}

.window-btn {
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  border: none; border-radius: 3px;
  background: transparent;
  color: var(--fg-light);
  font-size: 13px;
  line-height: 1;
  cursor: pointer;
  transition: all 0.15s;
}

.window-btn:hover {
  background: rgba(74, 67, 58, 0.12);
  color: var(--fg);
}

.window-btn.close:hover {
  background: rgba(200, 60, 60, 0.75);
  color: #fff;
}

/* ============================================================
   内容区
   ============================================================ */
.note-body {
  flex: 1;
  padding: 10px 14px 12px;
  position: relative;
  z-index: 1;
  outline: none;
  font-size: 14px;
  line-height: 1.8;
  overflow-y: auto;
  -webkit-app-region: no-drag;
  user-select: text;
  -webkit-user-select: text;
}

.note-body:empty::before {
  content: '写点什么...';
  color: var(--fg-muted);
  font-style: italic;
}

/* Markdown 样式 */
.note-body h1 { font-family: 'Playfair Display', 'LXGW WenKai', serif; font-size: 20px; margin: 8px 0 4px; font-weight: 600; }
.note-body h2 { font-family: 'Playfair Display', 'LXGW WenKai', serif; font-size: 17px; margin: 8px 0 4px; font-weight: 500; }
.note-body h3 { font-size: 15px; margin: 6px 0 3px; font-weight: 600; }
.note-body strong { font-weight: 700; }
.note-body em { font-style: italic; }
.note-body code {
  background: rgba(74, 67, 58, 0.08);
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 12px;
  font-family: 'Crimson Pro', monospace;
}
.note-body ul, .note-body ol { padding-left: 18px; margin: 4px 0; }
.note-body li { margin: 2px 0; }
.note-body blockquote {
  border-left: 3px solid var(--fg-muted);
  padding-left: 10px;
  margin: 6px 0;
  color: var(--fg-light);
  font-style: italic;
}

/* 滚动条 */
.note-body::-webkit-scrollbar { width: 4px; }
.note-body::-webkit-scrollbar-track { background: transparent; }
.note-body::-webkit-scrollbar-thumb { background: rgba(74, 67, 58, 0.15); border-radius: 2px; }

/* ============================================================
   底部状态栏
   ============================================================ */
.note-footer {
  height: 18px;
  padding: 0 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 10px;
  color: var(--fg-muted);
  position: relative;
  z-index: 1;
  -webkit-app-region: drag;
}

.note-footer .hint { opacity: 0.6; }

/* ============================================================
   缩放角标（右下角调整尺寸）
   ============================================================ */
.resize-corner {
  position: absolute;
  right: 8px; bottom: 8px;
  width: 14px; height: 14px;
  cursor: nwse-resize;
  z-index: 2;
  -webkit-app-region: no-drag;
  display: flex; align-items: flex-end; justify-content: flex-end;
}

.resize-corner::after {
  content: '';
  width: 8px; height: 8px;
  border-right: 2px solid var(--fg-muted);
  border-bottom: 2px solid var(--fg-muted);
  opacity: 0.5;
  transition: opacity 0.2s;
}

.resize-corner:hover::after { opacity: 1; }

/* ============================================================
   新建按钮（悬浮）
   ============================================================ */
.new-note-btn {
  position: absolute;
  bottom: 12px; right: 28px;
  width: 26px; height: 26px;
  border-radius: 50%;
  border: none;
  background: rgba(74, 67, 58, 0.1);
  color: var(--fg-light);
  font-size: 16px;
  cursor: pointer;
  z-index: 3;
  -webkit-app-region: no-drag;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
}

.new-note-btn:hover {
  background: rgba(74, 67, 58, 0.18);
  color: var(--fg);
  transform: rotate(90deg);
}
</style>
</head>
<body>

<div class="note" id="note">
  <div class="note-header">
    <div class="color-dots" id="colorDots">
      <span class="color-dot" data-color="cream"    style="background:#FAF6EE"></span>
      <span class="color-dot" data-color="blue"     style="background:#E8EDF2"></span>
      <span class="color-dot" data-color="pink"     style="background:#F2E8E8"></span>
      <span class="color-dot" data-color="green"    style="background:#E8F0E8"></span>
      <span class="color-dot" data-color="lavender" style="background:#ECE8F0"></span>
      <span class="color-dot" data-color="yellow"   style="background:#F5F0DC"></span>
    </div>
    <div class="window-actions">
      <button class="window-btn" id="btnPin" title="置顶">📌</button>
      <button class="window-btn" id="btnNew" title="新建便利贴">+</button>
      <button class="window-btn close" id="btnClose" title="关闭">✕</button>
    </div>
  </div>

  <div class="note-body" contenteditable="true" id="editor" spellcheck="false"></div>

  <div class="note-footer">
    <span class="hint">纸间</span>
    <span class="hint" id="timeStamp"></span>
  </div>

  <div class="resize-corner" title="调整尺寸"></div>
</div>

<script>
  // ============================================================
  // 初始化：读取参数 + 状态
  // ============================================================
  const params = (window.zhijian && zhijian.getParams) ? zhijian.getParams() : { color: 'cream', content: '' };

  const note = document.getElementById('note');
  const editor = document.getElementById('editor');
  const timeStamp = document.getElementById('timeStamp');

  note.dataset.color = params.color;
  document.querySelectorAll('.color-dot').forEach(d => {
    d.classList.toggle('active', d.dataset.color === params.color);
  });

  // 时间戳
  const now = new Date();
  timeStamp.textContent = `${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  // 初始内容
  if (params.content) {
    editor.innerHTML = params.content;
  } else {
    editor.innerHTML = '<h3>欢迎使用纸间</h3><p>双击可编辑内容，支持 <em>Markdown</em> 轻量格式。</p><p><strong>拖拽顶部</strong>移动窗口，<strong>右下角</strong>调整尺寸。</p>';
  }

  // ============================================================
  // 颜色切换
  // ============================================================
  document.querySelectorAll('.color-dot').forEach(dot => {
    dot.addEventListener('click', () => {
      const color = dot.dataset.color;
      note.dataset.color = color;
      document.querySelectorAll('.color-dot').forEach(d => d.classList.toggle('active', d === dot));
    });
  });

  // ============================================================
  // 窗口操作（通过 Electron IPC）
  // ============================================================
  let pinned = false;
  document.getElementById('btnClose').addEventListener('click', () => {
    if (window.zhijian) zhijian.closeNote();
  });

  document.getElementById('btnNew').addEventListener('click', () => {
    if (window.zhijian) zhijian.newNote({ color: note.dataset.color });
  });

  document.getElementById('btnPin').addEventListener('click', () => {
    pinned = !pinned;
    document.getElementById('btnPin').textContent = pinned ? '★' : '📌';
    document.getElementById('btnPin').title = pinned ? '已置顶（点击取消）' : '置顶';
    if (window.zhijian) zhijian.pin(pinned);
  });

  // ============================================================
  // Markdown 简易渲染（失焦时）
  // ============================================================
  function parseMarkdown(raw) {
    if (!raw || !raw.trim()) return '';
    const lines = raw.split('\n');
    let html = lines.map(line => {
      if (/^###\s+/.test(line)) return `<h3>${line.replace(/^###\s+/, '')}</h3>`;
      if (/^##\s+/.test(line)) return `<h2>${line.replace(/^##\s+/, '')}</h2>`;
      if (/^#\s+/.test(line)) return `<h1>${line.replace(/^#\s+/, '')}</h1>`;
      if (/^>\s+/.test(line)) return `<blockquote>${line.replace(/^>\s+/, '')}</blockquote>`;
      return line;
    }).join('<br>');

    html = html
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`([^`]+)`/g, '<code>$1</code>');

    return html;
  }

  editor.addEventListener('focus', () => {
    // 进入编辑态：把 HTML 转回纯文本（保留换行）
    const html = editor.innerHTML;
    const text = html
      .replace(/<h[1-6]>/g, '# ')
      .replace(/<\/h[1-6]>/g, '\n')
      .replace(/<strong>/g, '**').replace(/<\/strong>/g, '**')
      .replace(/<em>/g, '*').replace(/<\/em>/g, '*')
      .replace(/<code>/g, '`').replace(/<\/code>/g, '`')
      .replace(/<blockquote>/g, '> ').replace(/<\/blockquote>/g, '')
      .replace(/<br\s*\/?>/gi, '\n')
      .replace(/<[^>]+>/g, '')
      .trim();
    editor.innerText = text;
  });

  editor.addEventListener('blur', () => {
    const raw = editor.innerText;
    if (!raw.trim()) return;
    editor.innerHTML = parseMarkdown(raw);
  });

  // 回车时保持可编辑换行
  editor.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      // 让浏览器默认行为处理（contenteditable会插入<div>）
    }
  });

  // ============================================================
  // 快捷键
  // ============================================================
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
      e.preventDefault();
      if (window.zhijian) zhijian.newNote({ color: note.dataset.color });
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'w') {
      e.preventDefault();
      if (window.zhijian) zhijian.closeNote();
    }
  });
</script>
</body>
</html>
